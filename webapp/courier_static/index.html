<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Kuryer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg:#f3f6f8; --card:#fff; --ink:#13202b; --muted:#6b7a86; --line:#e5eaee;
            --brand:#0f766e; --brand-deep:#0b5b54; --ok:#16a34a; --danger:#dc2626; --warn:#b45309; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg);
           color:var(--ink); padding-bottom:env(safe-area-inset-bottom); }
    #tabs { position:sticky; top:0; z-index:5; display:flex; background:var(--card);
            border-bottom:1px solid var(--line); padding-top:env(safe-area-inset-top); }
    #tabs button { flex:1; border:0; background:none; padding:12px 4px; font-size:14px; font-weight:600;
                   color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
    #tabs button.active { color:var(--brand); border-bottom-color:var(--brand); }
    #tabs .badge { display:inline-block; min-width:18px; padding:0 5px; margin-left:4px; font-size:11px;
                   background:var(--brand); color:#fff; border-radius:9px; }
    #screen { padding:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:10px; }
    .row { display:flex; align-items:center; gap:8px; }
    .muted { color:var(--muted); font-size:13px; }
    .num { font-weight:800; color:var(--brand-deep); }
    .total { font-weight:800; font-size:16px; color:var(--brand-deep); }
    .items { font-size:13px; color:var(--ink); margin:6px 0; }
    .addr { font-size:14px; margin:4px 0; }
    .btn { display:block; width:100%; border:0; border-radius:12px; padding:13px; font-size:15px;
           font-weight:700; cursor:pointer; margin-top:8px; }
    .btn--claim { background:var(--brand); color:#fff; }
    .btn--go { background:var(--brand); color:#fff; }
    .btn--ok { background:var(--ok); color:#fff; }
    .btn--ghost { background:#eef2f4; color:var(--ink); }
    .btn:disabled { opacity:.6; }
    .pill { display:inline-block; padding:2px 9px; border-radius:9px; font-size:12px; font-weight:700; }
    .pill--new { background:#e6f6f3; color:var(--brand-deep); }
    .pill--act { background:#fef3c7; color:var(--warn); }
    .empty { text-align:center; color:var(--muted); padding:40px 16px; }
    .empty__icon { font-size:40px; }
    a.tel { color:var(--brand-deep); font-weight:700; text-decoration:none; }
    .stepper { display:flex; align-items:center; gap:14px; justify-content:center; margin:10px 0; }
    .stepper button { width:44px; height:44px; border-radius:12px; border:1px solid var(--line);
                      background:#fff; font-size:22px; font-weight:700; }
    .stepper .val { font-size:20px; font-weight:800; min-width:40px; text-align:center; }
    #toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); max-width:90%;
             background:#13202b; color:#fff; padding:10px 16px; border-radius:10px; font-size:14px;
             opacity:0; transition:opacity .2s; pointer-events:none; z-index:50; }
    #toast.show { opacity:1; }
    #toast.err { background:var(--danger); }
  </style>
</head>
<body>
  <div id="tabs">
    <button data-tab="available" class="active">📋 Mavjud <span class="badge" id="availBadge" hidden>0</span></button>
    <button data-tab="active">🚚 Menikim</button>
    <button data-tab="stats">📊 Statistika</button>
  </div>
  <div id="screen"><div class="empty"><div class="empty__icon">⏳</div>Yuklanmoqda…</div></div>
  <div id="toast"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
